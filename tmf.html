  letter-spacing: 0.08em;
  color: rgba(246,247,240,0.9);
  text-transform: uppercase;
}
.chat-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  padding: 0 1rem;
}
.messages-area {
  width: 100%;
  max-width: 780px;
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  padding: 1.2rem 0 1rem;
}
.messages-area::-webkit-scrollbar { width: 4px; }
.messages-area::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
.bubble-wrapper { display: flex; align-items: flex-end; gap: 0.6rem; }
.bubble-wrapper.user { flex-direction: row-reverse; }
.avatar {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em;
  text-transform: uppercase; overflow: hidden;
}
.avatar.bot { background: transparent; padding: 0; }
.avatar.user-av { background: var(--cream); color: var(--ink); border: 1px solid var(--rule); }
.bubble {
  max-width: 82%; padding: 1rem 1.2rem; border-radius: 18px;
  font-size: 0.92rem; line-height: 1.6; color: var(--ink);
}
.bubble.bot {
  background: #fff; border: 1px solid var(--rule);
  border-bottom-left-radius: 4px;
  box-shadow: 0 2px 12px rgba(19,25,20,0.06);
}
.bubble.user {
  background: var(--accent); color: var(--paper);
  border-bottom-right-radius: 4px;
}
.typing-indicator { display: flex; gap: 5px; padding: 1.1rem 1.2rem; align-items: center; }
.typing-dot {
  width: 7px; height: 7px; background: var(--accent2);
  border-radius: 50%; animation: bounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}
.bottom-area {
  width: 100%; max-width: 780px; padding: 0.6rem 0 0.8rem; flex-shrink: 0;
}
.input-bar {
  background: #fff; border: 1.5px solid var(--rule); border-radius: 18px;
  box-shadow: 0 4px 20px rgba(19,25,20,0.06);
  display: flex; align-items: flex-end; gap: 0.5rem;
  padding: 0.65rem 0.65rem 0.65rem 1.1rem;
  transition: border-color 0.2s;
}
.input-bar:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(94,117,131,0.12);
}
.input-bar textarea {
  flex: 1; border: none; outline: none; resize: none;
  font-family: 'Raleway', sans-serif; font-size: 0.93rem;
  color: var(--ink); background: transparent; line-height: 1.5;
  min-height: 24px; max-height: 120px; overflow-y: auto;
}
.input-bar textarea::placeholder { color: var(--mid); font-style: italic; }
.send-btn {
  width: 38px; height: 38px; border-radius: 12px;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s, transform 0.1s;
}
.send-btn:hover:not(:disabled) { background: var(--ink); transform: scale(1.04); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; fill: var(--paper); }
.footer-note { text-align: center; font-size: 0.72rem; color: var(--mid); margin-top: 0.4rem; }
.msg-bold { color: var(--ink); font-weight: 700; }
.msg-blank { display: inline-block; border-bottom: 1.5px solid var(--mid); min-width: 6rem; margin-bottom: -1px; vertical-align: baseline; }
</style>
</head>

let messages = [OPENING], loading = false, userName = '';

function esc(s) { return s.replace(/&amp;/g,'&amp;amp;').replace(/</g,'&amp;lt;').replace(/>/g,'&amp;gt;'); }

function parseBold(t) {
  return t.split(/(\*\*[^*]+\*\*|_{2,})/g).map(p => {
    if (p.startsWith('**') &amp;&amp; p.endsWith('**')) return '<strong class=&quot;msg-bold&quot;>' + esc(p.slice(2,-2)) + '</strong>';
    if (/^_{2,}$/.test(p)) return '<span class=&quot;msg-blank&quot;>&amp;nbsp;</span>';
    return esc(p);
  }).join('');
}

function fmt(text) {
  return text.split('\n').map(line => {
    if (line.startsWith('# '))  return '<div style=&quot;font-size:1.1rem;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem&quot;>' + esc(line.slice(2)) + '</div>';
    if (line.startsWith('## ')) return '<div style=&quot;font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.15em;margin:.6rem 0 .3rem&quot;>' + esc(line.slice(3)) + '</div>';
    if (line.startsWith('### '))return '<div style=&quot;font-size:.75rem;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem&quot;>' + esc(line.slice(4)) + '</div>';
    if (line.startsWith('- ') || line.startsWith('* ')) return '<div style=&quot;display:flex;gap:.5rem;margin-bottom:.2rem&quot;><span style=&quot;color:var(--accent);flex-shrink:0&quot;>&amp;#8226;</span><span>' + parseBold(line.slice(2)) + '</span></div>';
    const nm = line.match(/^(\d+)\.\s/);
    if (nm) return '<div style=&quot;display:flex;gap:.5rem;margin-bottom:.2rem&quot;><span style=&quot;color:var(--accent);flex-shrink:0;min-width:1.2rem&quot;>' + nm[1] + '.</span><span>' + parseBold(line.replace(/^\d+\.\s/,'')) + '</span></div>';
    if (!line.trim()) return '<div style=&quot;height:.5rem&quot;></div>';
    return '<p style=&quot;margin:0 0 .2rem 0;line-height:1.65&quot;>' + parseBold(line) + '</p>';
  }).join('');
}

function avatarHTML(role) {
  if (role === 'assistant') return '<div class=&quot;avatar bot&quot;><img src=&quot;' + LOGO + '&quot; style=&quot;width:100%;height:100%;object-fit:contain&quot; alt=&quot;PBM&quot;/></div>';
  const initials = userName ? userName.slice(0,3).toUpperCase() : 'YOU';
  return '<div class=&quot;avatar user-av&quot;>' + initials + '</div>';
}

function addBubble(msg) {
  const area = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrapper' + (msg.role==='user' ? ' user' : '');
  const bub = document.createElement('div');
  bub.className = 'bubble ' + (msg.role==='user' ? 'user' : 'bot');
  if (msg.role==='assistant') bub.innerHTML = fmt(msg.content);
  else bub.textContent = msg.content;
  wrap.innerHTML = avatarHTML(msg.role);
  wrap.appendChild(bub);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrapper'; wrap.id = 'typing';
  wrap.innerHTML = avatarHTML('assistant') + '<div class=&quot;bubble bot&quot;><div class=&quot;typing-indicator&quot;><div class=&quot;typing-dot&quot;></div><div class=&quot;typing-dot&quot;></div><div class=&quot;typing-dot&quot;></div></div></div>';
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

async function send() {
  const inp = document.getElementById('inp');
  const btn = document.getElementById('sendBtn');
  const txt = inp.value.trim();
  if (!txt || loading) return;
  // detect name from first user message
  if (messages.length === 1 &amp;&amp; !userName) {
    const m = txt.match(/^([A-Za-z]+)/);
    if (m) userName = m[1];
  }
  messages.push({role:'user', content:txt});
  addBubble({role:'user', content:txt});
  inp.value = ''; inp.style.height = 'auto';
  btn.disabled = true; loading = true;
  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        system: SYSTEM_PROMPT,
        messages: messages.map(m => ({role:m.role, content:m.content}))
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Something went wrong. Please try again.';
    messages.push({role:'assistant', content:reply});
    document.getElementById('typing')?.remove();
    addBubble({role:'assistant', content:reply});
  } catch(e) {
    document.getElementById('typing')?.remove();
    addBubble({role:'assistant', content:'There was a connection issue. Please try again.'});
  } finally {
    loading = false;
    btn.disabled = !inp.value.trim();
  }
}

inp.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight,120) + 'px';
  btn.disabled = !this.value.trim() || loading;
});
inp.addEventListener('keydown', e => {
  if (e.key==='Enter' &amp;&amp; !e.shiftKey) { e.preventDefault(); send(); }
