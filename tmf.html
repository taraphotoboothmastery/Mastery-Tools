<style>
@font-face {
  font-family: 'Romelu Vomelu';
  src: url('https://taraphotoboothmastery.github.io/Mastery-Tools/romelu-vomelu.woff') format('woff');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
@import url('https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap');
#tmf-wrap {
  --ink: #131914;
  --paper: #F6F7F0;
  --cream: #EBECE5;
  --accent: #5E7583;
  --accent2: #A2B4C7;
  --mid: #98A1A2;
  --rule: #DDE0D8;
  font-family: 'Raleway', sans-serif;
  background: var(--paper);
  color: var(--ink);
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 750px;
}
#tmf-wrap * { box-sizing: border-box; margin: 0; padding: 0; }
#tmf-topbar {
  background: #3d5260;
  padding: 0.6rem 1.5rem;
  flex-shrink: 0;
}
#tmf-topbar span {
  font-family: 'Romelu Vomelu', 'Raleway', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  color: rgba(246,247,240,0.9);
  text-transform: uppercase;
}
#tmf-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  padding: 0 1.2rem;
  background: var(--paper);
}
#tmf-msgs {
  width: 100%;
  max-width: 780px;
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  padding: 1.2rem 0.5rem 1rem;
}
#tmf-msgs::-webkit-scrollbar { width: 4px; }
#tmf-msgs::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
.tmf-row { display: flex; align-items: flex-end; gap: 0.6rem; }
.tmf-row.tmf-user { flex-direction: row-reverse; }
.tmf-av {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em;
  text-transform: uppercase; overflow: hidden; font-family: 'Raleway', sans-serif;
}
.tmf-av-bot { background: transparent; }
.tmf-av-bot img { width: 100%; height: 100%; object-fit: contain; }
.tmf-av-user { background: var(--cream); color: var(--ink); border: 1px solid var(--rule); }
.tmf-bubble {
  max-width: 82%; padding: 14px 16px !important; border-radius: 18px;
  font-size: 0.92rem; line-height: 1.6; color: var(--ink);
  font-family: 'Raleway', sans-serif;
}
.tmf-bubble-bot {
  background: #fff; border: 1px solid var(--rule);
  border-bottom-left-radius: 4px;
  box-shadow: 0 2px 12px rgba(19,25,20,0.06);
}
.tmf-bubble-user {
  background: var(--accent); color: var(--paper);
  border-bottom-right-radius: 4px;
}
.tmf-typing { display: flex; gap: 5px; padding: 1.1rem 1.2rem; align-items: center; }
.tmf-dot {
  width: 7px; height: 7px; background: var(--accent2);
  border-radius: 50%; animation: tmfbounce 1.2s infinite;
}
.tmf-dot:nth-child(2) { animation-delay: 0.2s; }
.tmf-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes tmfbounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}
#tmf-bottom {
  width: 100%; max-width: 780px; padding: 0.6rem 0 0.8rem; flex-shrink: 0;
}
#tmf-inputbar {
  background: #fff; border: 1.5px solid var(--rule); border-radius: 18px;
  box-shadow: 0 4px 20px rgba(19,25,20,0.06);
  display: flex; align-items: flex-end; gap: 0.5rem;
  padding: 0.65rem 0.65rem 0.65rem 1.1rem;
  transition: border-color 0.2s;
}
#tmf-inputbar:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(94,117,131,0.12);
}
#tmf-inp {
  flex: 1; border: none; outline: none; resize: none;
  font-family: 'Raleway', sans-serif; font-size: 0.93rem;
  color: var(--ink); background: transparent; line-height: 1.5;
  min-height: 24px; max-height: 120px; overflow-y: auto;
}
#tmf-inp::placeholder { color: var(--mid); font-style: italic; }
#tmf-send {
  width: 38px; height: 38px; border-radius: 12px;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s, transform 0.1s;
}
#tmf-send:hover:not(:disabled) { background: var(--ink); transform: scale(1.04); }
#tmf-send:disabled { opacity: 0.4; cursor: not-allowed; }
#tmf-send svg { width: 16px; height: 16px; fill: var(--paper); }
#tmf-footer { text-align: center; font-size: 0.72rem; color: var(--mid); margin-top: 0.4rem; font-family: 'Raleway', sans-serif; }
.tmf-bold { color: var(--ink); font-weight: 700; }
.tmf-blank { display: inline-block; border-bottom: 1.5px solid var(--mid); min-width: 6rem; margin-bottom: -1px; vertical-align: baseline; }
</style>

<div id="tmf-wrap">
  <div id="tmf-topbar"><span>PHOTO BOOTH MASTERY &middot; TARGET MARKET FOCUSER</span></div>
  <div id="tmf-body">
    <div id="tmf-msgs"></div>
    <div id="tmf-bottom">
      <div id="tmf-inputbar">
        <textarea id="tmf-inp" placeholder="Share your answer here..." rows="1"></textarea>
        <button id="tmf-send" disabled>
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div id="tmf-footer">Enter to send &middot; Shift+Enter for new line &middot; Say "save progress" to pause</div>
    </div>
  </div>
</div>

<script>
(function(){
  var LOGO = 'https://taraphotoboothmastery.github.io/Mastery-Tools/pbm-logo.png';
  var SP = `You are Target Market Focuser, created by Photo Booth Mastery. Your role is to guide photo booth owners through identifying their most profitable client segments so they can refine their marketing and business strategy.

Your target audience: photo booth business owners who have surpassed the startup phase, typically making around $30K annually, often couples or solo entrepreneurs. They want financial freedom, more consistent bookings, premium clients, and work-life balance. They feel stuck, overworked, and undervalued, and they crave proven strategies, automation, clarity, and mentorship to scale sustainably.

How you work: Ask one question at a time in a natural, conversational style. Start with a warm introduction and ask: "Let's start simple. What's your name, and what's the name of your business?" Encourage them to give detail by reminding them that the more detail they share, the sharper the report will be. Never assume details. If the user says "skip," move on. When all questions are answered, generate a Target Market Report with insights on corporate and wedding markets plus tailored marketing recommendations.

Progress saving: At any point, let members know they can stop and return later. If they say they want to pause or save, provide a short summary of what's been collected so far and clearly mark that they can resume from the next unanswered question whenever they're ready. Do not pressure them to continue in one sitting.

Tone and style: Friendly, warm, conversational, and motivational, in alignment with Photo Booth Mastery's brand identity. Relatable and approachable, but also clear and practical. Never use emojis or em dashes. Avoid jargon. Sound like a supportive coach who understands their struggles and helps them see a bigger, more profitable future. Use casual phrasing, rhetorical questions, and short, punchy sentences to create rhythm. Draw on analogies and references that feel fresh, fun, and millennial/Gen Z friendly (like Taylor Swift, Survivor, coffee culture, etc.) when clarifying points.

Message length: Keep messages concise but warm. Aim for 3-5 sentences before asking the next question. You can add a brief insight or encouraging line to keep momentum, but avoid lengthy explanations or over-explaining. One idea, one transition, one question.

Content focus: Stay focused on photo booth business owners. Keep questions and answers grounded in corporate events and weddings, since those are the two primary profitable markets. Everything should connect back to clarifying their ideal clients and refining their marketing focus.

Question flow:
Corporate Event Questions
- What corporate events have you done?
- The majority of these bookings came from: ____
- The top 3 ways they found you were: ____
- What type of corporate events do you want to book more of?
- What were your top 3 types of corporate events? Please list their average booking value.
- Where should your corporate marketing efforts be focused based on past leads?
- The events that brought in the most revenue for my business were ____ and ____.
- The clients who booked me for these events were mostly ____ and ____.
- They found me through ____, ____, and ____.
- When looking for vendors, these clients typically go to ____.
- They are often influenced by ____.
- Personally, they attend ____.
- The main reason they booked me was ____.
- During our conversations, they emphasized they cared most about ____.
- What ultimately convinced them to move forward was ____.

Wedding Event Questions
- What kinds of weddings have you done?
- Who booked you?
- The top 3 ways they found you were: ____
- What type of weddings do you want to book more of?
- What type of clients are your best, highest-paying customers?
- Where should your wedding marketing efforts be focused based on past leads?
- The weddings that brought in the most revenue for my business were ____.
- The clients who booked me were mostly ____.
- They found me through ____, ____, and ____.
- When looking for vendors, my ideal wedding clients go to ____.
- They are often influenced by ____.
- Personally, they attend ____.
- The main reason they booked me was ____.
- During our conversations, they emphasized they cared most about ____.
- What ultimately convinced them to move forward was ____.

Output format:
Target Market Report
Corporate Events
- Most Profitable Events
- Who Booked You
- How They Found You
- Where They Look for Vendors
- What Convinced Them to Book
- Key Motivations

Weddings
- Most Profitable Weddings
- Who Booked You
- How They Found You
- Where They Look for Vendors
- What Convinced Them to Book
- Key Motivations

Marketing Recommendations
- Focus efforts on [channel/platform] because it consistently brings in premium clients.
- Highlight [key motivators] in all sales materials.
- Invest in [specific event type/market] since it generates the highest ROI.
- Show more [social proof/case studies] to reinforce buying decisions.
- Build presence at [industry events/expos] where your best clients are.

End the report with: If you have questions or want extra support, email us directly at accounts@catalinabloch.com.

Completion: After delivering the Target Market Report, stop. Do not continue with more questions. Let members know their report is complete. Only if they explicitly ask for more, provide optional bonus prompts (like a 30-day plan, 90-day roadmap, corporate vs. wedding split, brand messaging, or About Us draft). Always precede these with a disclaimer line: "The following are ChatGPT-generated ideas, not official Photo Booth Mastery guidance."

Opening instructions: At the very start, tell members:
1. I'll ask you one question at a time about your corporate and wedding clients.
2. The more detail you share, the sharper and more personalized your Target Market Report will be.
3. You don't need to finish in one sitting. If you want to pause, just say "save progress" and I'll summarize what we've covered so you can pick up right where you left off.
4. Once all questions are answered, I'll generate your full Target Market Report with insights and tailored marketing recommendations.
5. After you receive your report, you're done. If you'd like to go deeper, I can share optional ChatGPT recommendations, but only if you ask.

Guardrails:
- No emojis.
- No em dashes.
- Never mention WeddingWire. It is not relevant to corporate clients and is not well-recognized in the industry.
- Keep everything focused on photo booth owners.
- Maintain the Photo Booth Mastery brand voice: conversational, motivating, authentic, and approachable.
- Always connect advice back to their real business context, obstacles, and desires as outlined in the brand book.
- Provide clear starting instructions at the beginning so members know what to expect and how to get the best results.`;
  var OPENING = {role:'assistant',content:`Welcome to Target Market Focuser. Let's get clear on who your most profitable clients are so your marketing works as hard as you do.

Here is how this works: I will ask you one question at a time. The more detail you share, the sharper your Target Market Report will be. You can pause anytime by saying "save progress."

Ready? Let's start simple. What's your name, and what's the name of your business?
`};
  var messages = [OPENING], loading = false, userName = '';

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function parseBold(t){
    return t.split(/(\*\*[^*]+\*\*|_{2,})/g).map(function(p){
      if(p.startsWith('**')&&p.endsWith('**')) return '<strong class="tmf-bold">'+esc(p.slice(2,-2))+'</strong>';
      if(/^_{2,}$/.test(p)) return '<span class="tmf-blank">&nbsp;</span>';
      return esc(p);
    }).join('');
  }

  function fmt(text){
    return text.split('\n').map(function(line){
      if(line.startsWith('# '))  return '<div style="font-size:1.1rem;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem">'+esc(line.slice(2))+'</div>';
      if(line.startsWith('## ')) return '<div style="font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.15em;margin:.6rem 0 .3rem">'+esc(line.slice(3))+'</div>';
      if(line.startsWith('### '))return '<div style="font-size:.75rem;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem">'+esc(line.slice(4))+'</div>';
      if(line.startsWith('- ')||line.startsWith('* ')) return '<div style="display:flex;gap:.5rem;margin-bottom:.2rem"><span style="color:var(--accent);flex-shrink:0">&#8226;</span><span>'+parseBold(line.slice(2))+'</span></div>';
      var nm=line.match(/^(\d+)\.\s/);
      if(nm) return '<div style="display:flex;gap:.5rem;margin-bottom:.2rem"><span style="color:var(--accent);flex-shrink:0;min-width:1.2rem">'+nm[1]+'.</span><span>'+parseBold(line.replace(/^\d+\.\s/,''))+'</span></div>';
      if(!line.trim()) return '<div style="height:.5rem"></div>';
      return '<p style="margin:0 0 .2rem 0 !important;line-height:1.65;padding:0 !important">'+parseBold(line)+'</p>';
    }).join('');
  }

  function avHTML(role){
    if(role==='assistant') return '<div class="tmf-av tmf-av-bot"><img src="'+LOGO+'" alt="PBM"/></div>';
    var init = userName ? userName.slice(0,3).toUpperCase() : 'YOU';
    return '<div class="tmf-av tmf-av-user">'+init+'</div>';
  }

  function addMsg(msg){
    var area=document.getElementById('tmf-msgs');
    var wrap=document.createElement('div');
    wrap.className='tmf-row'+(msg.role==='user'?' tmf-user':'');
    var bub=document.createElement('div');
    bub.className='tmf-bubble '+(msg.role==='user'?'tmf-bubble-user':'tmf-bubble-bot');
    if(msg.role==='assistant') bub.innerHTML=fmt(msg.content);
    else bub.textContent=msg.content;
    wrap.innerHTML=avHTML(msg.role);
    wrap.appendChild(bub);
    area.appendChild(wrap);
    area.scrollTop=area.scrollHeight;
  }

  function showTyping(){
    var area=document.getElementById('tmf-msgs');
    var wrap=document.createElement('div');
    wrap.className='tmf-row'; wrap.id='tmf-typing';
    wrap.innerHTML=avHTML('assistant')+'<div class="tmf-bubble tmf-bubble-bot"><div class="tmf-typing"><div class="tmf-dot"></div><div class="tmf-dot"></div><div class="tmf-dot"></div></div></div>';
    area.appendChild(wrap);
    area.scrollTop=area.scrollHeight;
  }

  async function send(){
    var inp=document.getElementById('tmf-inp');
    var btn=document.getElementById('tmf-send');
    var txt=inp.value.trim();
    if(!txt||loading) return;
    if(messages.length===1&&!userName){
      var m=txt.match(/^([A-Za-z]+)/);
      if(m) userName=m[1];
    }
    messages.push({role:'user',content:txt});
    addMsg({role:'user',content:txt});
    inp.value=''; inp.style.height='auto';
    btn.disabled=true; loading=true;
    showTyping();
    try{
      var res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system:SP,
          messages:messages.map(function(m){return{role:m.role,content:m.content}})
        })
      });
      var data=await res.json();
      var reply=(data.content&&data.content[0]&&data.content[0].text)?data.content[0].text:'Something went wrong. Please try again.';
      messages.push({role:'assistant',content:reply});
      var t=document.getElementById('tmf-typing'); if(t) t.remove();
      addMsg({role:'assistant',content:reply});
    }catch(e){
      var t=document.getElementById('tmf-typing'); if(t) t.remove();
      addMsg({role:'assistant',content:'There was a connection issue. Please try again.'});
    }finally{
      loading=false;
      btn.disabled=!inp.value.trim();
    }
  }

  addMsg(OPENING);
  var inp=document.getElementById('tmf-inp');
  var btn=document.getElementById('tmf-send');
  inp.addEventListener('input',function(){
    this.style.height='auto';
    this.style.height=Math.min(this.scrollHeight,120)+'px';
    btn.disabled=!this.value.trim()||loading;
  });
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
  });
  btn.addEventListener('click',send);
})();
</script>
